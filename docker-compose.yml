name: mypartner

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: mypartner:local
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: mypartner:local
    command: pnpm start:api
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      API_STATELESS: "false"
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      ALLOWED_EMAILS: ${ALLOWED_EMAILS:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}

  vercel-build:
    build:
      context: .
      dockerfile: Dockerfile.vercel
    image: mypartner-vercel-build:local
    environment:
      VERCEL_TOKEN: ${VERCEL_TOKEN:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
    volumes:
      - ./.vercel:/app/.vercel
